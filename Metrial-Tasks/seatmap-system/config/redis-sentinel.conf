# Redis Sentinel Configuration for High Availability
# This configuration provides automatic failover and removes single point of failure

# Port for Sentinel to listen on
port 26379

# Monitor seatmap Redis instances
# Format: sentinel monitor <master-name> <ip> <port> <quorum>
# Quorum = minimum number of Sentinels that must agree master is down
sentinel monitor seatmap-master 127.0.0.1 6379 2
sentinel monitor seatmap-lock-1 127.0.0.1 6380 2
sentinel monitor seatmap-lock-2 127.0.0.1 6381 2

# Authentication (if Redis requires password)
# sentinel auth-pass seatmap-master your_redis_password

# Down-after-milliseconds: time to consider master down
sentinel down-after-milliseconds seatmap-master 5000
sentinel down-after-milliseconds seatmap-lock-1 5000
sentinel down-after-milliseconds seatmap-lock-2 5000

# Failover timeout
sentinel failover-timeout seatmap-master 10000
sentinel failover-timeout seatmap-lock-1 10000
sentinel failover-timeout seatmap-lock-2 10000

# Parallel syncs: number of replicas that can sync simultaneously
sentinel parallel-syncs seatmap-master 1
sentinel parallel-syncs seatmap-lock-1 1
sentinel parallel-syncs seatmap-lock-2 1

# Log file
logfile "/var/log/redis/sentinel.log"

# Directory for Sentinel data
dir "/tmp"

# Enable TLS (optional, for production)
# tls-port 26379
# tls-cert-file /etc/ssl/certs/redis.crt
# tls-key-file /etc/ssl/private/redis.key
